  <head>
    <meta charset="UTF-8" />

    <title>開聞クリニック通所送迎システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans JP', sans-serif;
      }

      /* Position print content on-screen but invisibly behind other content.
         This ensures the browser performs layout calculations correctly,
         which is more reliable for html2canvas than off-screen rendering. */
      #print-mount-point {
        position: fixed;
        top: 0;
        left: 0;
        width: auto; /* Allow content to define its own width */
        height: auto;
        z-index: -10;
        opacity: 0;
        pointer-events: none;
        background-color: white;
      }

      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        @page {
          size: A4 portrait;
          margin: 15mm;
        }
      }
      /* Custom animation for fade-in and slide-up */
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.3s ease-out forwards;
      }
      @keyframes fade-in {
          from { opacity: 0; }
          to { opacity: 1; }
      }
      .animate-fade-in {
          animation: fade-in 0.5s ease-in-out forwards;
      }
    </style>
